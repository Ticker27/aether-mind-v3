name: Build NEXUS ULTRA APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install Android SDK
      run: |
        # Install command-line tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip -d android-sdk
        mkdir -p android-sdk/cmdline-tools/latest
        # Move contents properly
        mv android-sdk/cmdline-tools/!(*latest*) android-sdk/cmdline-tools/latest/ 2>/dev/null || true
        
        # Set environment
        export ANDROID_HOME=$PWD/android-sdk
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        
        # Add to PATH
        echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
        
        # Create local.properties for Gradle
        echo "sdk.dir=$ANDROID_HOME" > android/local.properties
        
        # Accept licenses
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        
        # Install required SDK components
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
          "platforms;android-34" \
          "build-tools;34.0.0" \
          "ndk;25.2.9519653" 2>&1 | tail -5 || echo "SDK install had issues"
        
        echo "✅ Android SDK installed at $ANDROID_HOME"

    - name: Make gradlew executable
      run: chmod +x android/gradlew

    - name: Build APK with Gradle
      run: |
        cd android
        export ANDROID_HOME=${{ env.ANDROID_HOME }}
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Find APK
      run: |
        echo "Looking for APK..."
        find android -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        ls -la android/build/outputs/ 2>/dev/null
        ls -la android/app/build/outputs/ 2>/dev/null

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: nexus-ultra-apk
        path: |
          android/**/outputs/apk/**/*.apk
        retention-days: 30