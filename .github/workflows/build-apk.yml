name: Build AETHER MIND APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable
      run: chmod +x android/gradlew

    - name: Build APK with Gradle
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon

    - name: Find APK
      run: |
        cd android
        find . -name "*.apk" -type f
        ls -la build/outputs/apk/debug/ 2>/dev/null || echo "No debug dir"
        ls -la build/outputs/apk/ 2>/dev/null || echo "No outputs/apk dir"
        ls -la build/ 2>/dev/null || echo "No build dir"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aether-mind-apk
        path: android/build/outputs/apk/debug/*.apk
        retention-days: 30
        if-no-files-found: error

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: android/app/build/outputs/apk/debug/app-debug.apk
        generate_release_notes: true
