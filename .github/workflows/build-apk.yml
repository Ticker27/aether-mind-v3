name: Build NEXUS ULTRA APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install Android SDK
      run: |
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip -d android-sdk
        mkdir -p android-sdk/cmdline-tools/latest
        for f in android-sdk/cmdline-tools/*; do
          if [ "$f" != "android-sdk/cmdline-tools/latest" ]; then
            mv "$f"/* android-sdk/cmdline-tools/latest/ 2>/dev/null || true
          fi
        done
        export ANDROID_HOME=$PWD/android-sdk
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
        mkdir -p "$ANDROID_HOME/licenses"
        echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > "$ANDROID_HOME/licenses/android-sdk-license"
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> "$ANDROID_HOME/licenses/android-sdk-license"
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> "$ANDROID_HOME/licenses/android-sdk-license"
        echo "sdk.dir=$ANDROID_HOME" > android/local.properties
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;33.0.1" "build-tools;34.0.0" 2>&1 | tail -5
        echo "✅ SDK installed at $ANDROID_HOME"

    - name: Make gradlew executable
      run: chmod +x android/gradlew

    - name: Build APK with Gradle
      run: |
        cd android
        export ANDROID_HOME=${{ env.ANDROID_HOME }}
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: nexus-ultra-apk
        path: android/build/outputs/apk/debug/*.apk
        retention-days: 30