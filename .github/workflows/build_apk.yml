name: Build APK
on: [push, workflow_dispatch, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;26.1.10909125" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5 || true
          echo "NDK/SDK installed"
      - name: Check files
        run: |
          echo "=== brain.h ==="
          wc -l app/src/main/jni/brain/brain.h 2>/dev/null || echo "MISSING"
          echo "=== jni_bridge.cpp ==="
          wc -l app/src/main/jni/core/jni_bridge.cpp 2>/dev/null || echo "MISSING"
          echo "=== CMakeLists.txt ==="
          cat app/src/main/jni/CMakeLists.txt 2>/dev/null || echo "MISSING"
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --console=plain 2>&1 | tail -60
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aether-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: ignore
